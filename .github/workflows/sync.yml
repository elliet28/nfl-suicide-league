name: Sync NFL scores

on:
  # Schedule trigger is disabled until the app is deployed and SYNC_URL /
  # CRON_SECRET are set as repo secrets (Settings -> Secrets and variables ->
  # Actions). Re-enable by uncommenting the schedule block below.
  # schedule:
  #   - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Call sync endpoint
        run: |
          curl -sf -X POST "$SYNC_URL" -H "Authorization: Bearer $CRON_SECRET"
        env:
          SYNC_URL: ${{ secrets.SYNC_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
