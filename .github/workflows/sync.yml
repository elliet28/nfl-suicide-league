name: Sync NFL scores

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Call sync endpoint
        run: |
          curl -sf -X POST "$SYNC_URL" -H "Authorization: Bearer $CRON_SECRET"
        env:
          SYNC_URL: ${{ secrets.SYNC_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
